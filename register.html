<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Swast Bharat</title>
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif;}
body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: #0a0a0a;
  perspective:1200px;
}

/* Moving background shapes */
.bg-shape{
  position:absolute;
  border-radius:50%;
  opacity:0.1;
  animation:move 10s linear infinite;
}
.bg-shape:nth-child(1){width:200px;height:200px; background:#0b1c45; top:10%; left:20%; animation-duration:12s;}
.bg-shape:nth-child(2){width:150px;height:150px; background:#0d2a66; top:50%; left:70%; animation-duration:15s;}
.bg-shape:nth-child(3){width:100px;height:100px; background:#05132f; top:80%; left:40%; animation-duration:18s;}

@keyframes move{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(-30px) translateX(20px);}
  100%{transform:translateY(0) translateX(0);}
}

/* Registration card */
.container{
  position:relative;
  background: rgba(10,10,30,0.8);
  backdrop-filter: blur(15px);
  padding:50px;
  border-radius:25px;
  width:350px;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  animation:float 6s ease-in-out infinite;
  transform-style: preserve-3d;
}

@keyframes float{
  0%,100%{transform: translateY(0);}
  50%{transform: translateY(-20px);}
}

h1{
  color:#1e90ff;
  margin-bottom:30px;
  text-shadow: 0 0 10px #1e90ff;
}

input{
  width:100%;
  padding:12px 15px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  outline:none;
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:16px;
  transition:0.3s;
}
input:focus{
  background: rgba(30,30,60,0.6);
  transform: scale(1.02);
  box-shadow: 0 0 15px #1e90ff;
}

button{
  padding:14px 30px;
  margin-top:20px;
  background:#1e90ff;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  color:white;
  box-shadow: 0 0 15px #1e90ff;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1) rotateX(5deg) rotateY(5deg);
  background:#63b3ff;
  box-shadow: 0 0 25px #63b3ff;
}

/* Optional small text link */
p a{
  color:#1e90ff;
  text-decoration:none;
  transition:0.3s;
}
p a:hover{color:#63b3ff; text-shadow:0 0 5px #63b3ff;}

</style>
</head>
<body>

<!-- Animated background shapes -->
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<div class="container">
  <h1>Register</h1>
  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <input type="password" placeholder="Confirm Password">
  <button onclick="window.location.href='dashboard.html'">Register</button>
  <p style="margin-top:15px;">Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
