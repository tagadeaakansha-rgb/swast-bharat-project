<!DOCTYPE html>

<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif;}
body{
height:100vh;
overflow-x:hidden;
color: rgb(202, 223, 226);
perspective:1200px;
}

/* Moving background shapes */
.bg-shape{
  position:absolute;
  border-radius:50%;
  opacity:0.1;
  animation:move 10s linear infinite;
}
.bg-shape:nth-child(1){width:250px;height:250px; background:#0b1c45; top:10%; left:15%; animation-duration:12s;}
.bg-shape:nth-child(2){width:180px;height:180px; background:#0d2a66; top:50%; left:70%; animation-duration:15s;}
.bg-shape:nth-child(3){width:120px;height:120px; background:#05132f; top:80%; left:40%; animation-duration:18s;}

@keyframes move{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(-30px) translateX(20px);}
  100%{transform:translateY(0) translateX(0);}
}

/* Navigation */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:relative;
  z-index:2;
}
nav h2{color:#1e90ff;}
nav ul{display:flex; list-style:none; gap:20px;}
nav li{cursor:pointer; transition:0.3s;}
nav li:hover{color:#63b3ff;}

/* Hero Section */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:90vh;
  padding:0 50px;
  position:relative;
  z-index:2;
}
.hero-text{
  max-width:500px;
  animation:fadeUp 1.5s ease;
}
.hero-text h1{
  font-size:60px;
  color:#1e90ff;
  margin-bottom:20px;
  text-shadow: 0 0 10px #1e90ff;
}
.hero-text p{
  font-size:20px;
  margin-bottom:25px;
}
.btn{
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#1e90ff;
  font-size:18px;
  cursor:pointer;
  color:white;
  box-shadow:0 0 15px #1e90ff;
  transition:0.3s;
  animation:btnBounce 2s infinite;
}
.btn:hover{
  transform:scale(1.1) rotateX(5deg) rotateY(5deg);
  background:#63b3ff;
  box-shadow:0 0 25px #63b3ff;
}

/* Hero image */
.hero-img img{
  width:600px;
  border-radius:30px;
  animation:float 5s ease-in-out infinite;
  box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

/* Features section */
.features{
  padding:80px 50px;
  text-align:center;
  position:relative;
  z-index:2;
}
.features h2{
  font-size:40px;
  color:#1e90ff;
  margin-bottom:40px;
}
.cards{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}
.card{
  background: rgba(10,10,30,0.8);
  backdrop-filter: blur(15px);
  padding:25px;
  width:260px;
  border-radius:20px;
  transition:0.4s;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}
.card:hover{
  transform:translateY(-15px) scale(1.05);
  background: rgba(10,10,50,0.9);
}

/* Animations */
@keyframes fadeUp{from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
@keyframes btnBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

footer{
  text-align:center;
  padding:30px;
  margin-top:60px;
  background:#05050a;
  position:relative;
  z-index:2;
}
</style>
</head>
<body>
 <body style="background-image:url('back.jpg'); background-size:cover;">

<div class="bg-shape"></div>

<h1>Swast Bharat</h1>
<p>Empowering rural India with accessible healthcare</p>
<button class="btn" onclick="window.location.href='register.html'">Get Started</button>
</div>

<img src="c:\Users\hp\Downloads\clinic.png" alt="Clinic">
</div>

<footer>
<p>2026 Swast Bharat </p>
</footer>
</body>
